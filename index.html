<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chrono Spire</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="screen-start" class="screen active">
        <h1>Chrono Spire</h1>
        <select id="class-select">
            <option value="The Scarred">The Scarred (Traps)</option>
            <option value="The Frenzied">The Frenzied (Momentum)</option>
            <option value="The Stoic">The Stoic (Anchors)</option>
            <option value="The Wanderer">The Wanderer (Phase Shift)</option>
            <option value="The Gambler">The Gambler (Chaos)</option>
        </select>
        <button onclick="initGame()">Enter the Spire</button>
    </div>

    <div id="screen-combat" class="screen">
        <div id="top-bar">
            <div>Floor: <span id="floor-number">1</span></div>
            <div id="turn-indicator">Player Turn</div>
            <div id="player-class-name">Class</div>
        </div>
        
        <div id="battlefield">
            <div class="entity" id="player-entity">
                <h3>Player</h3>
                <div class="hp-bar"><div class="hp-fill" id="player-hp-fill"></div></div>
                <div>HP: <span id="player-hp-text"></span> | BLK: <span id="player-block"></span></div>
                <div id="player-relics"></div>
                <div id="player-status" style="color:#ffeb3b; font-size: 12px;"></div>
            </div>

            <div class="entity" id="enemy-entity">
                <h3 id="enemy-name">Enemy</h3>
                <div id="enemy-intent">Intent: Loading...</div>
                <div id="alt-intent" style="display:none; color:#cddc39;">Alt Intent: Loading...</div>
                <div class="hp-bar"><div class="hp-fill" id="enemy-hp-fill"></div></div>
                <div>HP: <span id="enemy-hp-text"></span> | BLK: <span id="enemy-block"></span></div>
                <div id="enemy-status" style="color:#ffeb3b; font-size: 12px;"></div>
            </div>
        </div>

        <div id="timeline-container"></div>
        <div id="hand-container"></div>
    </div>

    <script src="data.js"></script>
    <script src="engine.js"></script>
</body>
</html>
